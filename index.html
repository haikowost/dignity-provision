<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dignity Provision | 3CI Community</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, updateDoc, increment, deleteDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        const { useState, useEffect, useMemo } = React;

        // --- ICONS (Custom SVG for Maximum Stability) ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                Heart: <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" />,
                Briefcase: <><rect width="20" height="14" x="2" y="7" rx="2" ry="2" /><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" /></>,
                User: <><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></>,
                Plus: <path d="M5 12h14M12 5v14" />,
                CheckCircle: <><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><polyline points="22 4 12 14.01 9 11.01" /></>,
                Shield: <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10" />,
                Search: <><circle cx="11" cy="11" r="8" /><path d="m21 21-4.3-4.3" /></>,
                Home: <><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /><polyline points="9 22 9 12 15 12 15 22" /></>,
                Trash2: <><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6" /></>,
                Settings: <><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" /><circle cx="12" cy="12" r="3" /></>,
                Lock: <><rect width="18" height="11" x="3" y="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></>
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const PrayingHandsIcon = ({ size = 20, className = "" }) => (
          <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            <path d="M18 8c0-3.3-2.7-6-6-6s-6 2.7-6 6c0 2.2 1.2 4.1 3 5.2V20a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2v-6.8c1.8-1.1 3-3 3-5.2Z" /><path d="M10 10h4" /><path d="M12 8v4" />
          </svg>
        );

        // --- Firebase Config Logic ---
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'church-employment-init';
        const ACCESS_CODE = "3Ci";

        function App() {
          const [user, setUser] = useState(null);
          const [authorized, setAuthorized] = useState(false);
          const [accessInput, setAccessInput] = useState('');
          const [activeTab, setActiveTab] = useState('home'); 
          const [candidates, setCandidates] = useState([]);
          const [loading, setLoading] = useState(true);
          const [isAdmin, setIsAdmin] = useState(false);

          // Auth logic
          useEffect(() => {
            const initAuth = async () => {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            };
            initAuth();
            const unsubscribe = onAuthStateChanged(auth, (u) => {
              if (u) {
                setUser(u);
                setIsAdmin(u.isAnonymous === false); 
                setLoading(false);
              }
            });
            return () => unsubscribe();
          }, []);

          // Data Fetching logic
          useEffect(() => {
            if (!user || !authorized) return;
            const candRef = collection(db, 'artifacts', appId, 'public', 'data', 'candidates');
            const unsub = onSnapshot(candRef, (snapshot) => {
              setCandidates(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
            });
            return () => unsub();
          }, [user, authorized]);

          const handleAccess = (e) => {
            e.preventDefault();
            if (accessInput === ACCESS_CODE) {
                setAuthorized(true);
            } else {
                alert("Incorrect code. Please check with your Men's Group lead.");
            }
          };

          if (loading) return (
            <div className="min-h-screen bg-slate-50 flex items-center justify-center">
              <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
            </div>
          );

          // ACCESS GATE UI
          if (!authorized) {
            return (
                <div className="min-h-screen bg-indigo-900 flex items-center justify-center p-6 text-white">
                    <div className="max-w-md w-full text-center space-y-8">
                        <div className="bg-white/10 p-6 rounded-[2.5rem] backdrop-blur-md border border-white/20">
                            <div className="bg-white text-indigo-900 w-16 h-16 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl">
                                <Icon name="Lock" size={32} />
                            </div>
                            <h1 className="text-3xl font-black mb-2">3CI Community</h1>
                            <p className="text-indigo-200 text-sm mb-8">Please enter the community access code to view provision opportunities.</p>
                            
                            <form onSubmit={handleAccess} className="space-y-4">
                                <input 
                                    type="password" 
                                    placeholder="Enter Code" 
                                    className="w-full p-4 bg-white/10 border border-white/30 rounded-2xl text-center text-xl font-bold tracking-widest outline-none focus:bg-white/20 transition-all"
                                    value={accessInput}
                                    onChange={(e) => setAccessInput(e.target.value)}
                                />
                                <button className="w-full py-4 bg-white text-indigo-900 rounded-2xl font-black uppercase tracking-widest shadow-xl active:scale-95 transition-transform">
                                    Enter Provision
                                </button>
                            </form>
                        </div>
                        <p className="text-xs text-indigo-400 uppercase font-black tracking-widest">Dignity Through Provision</p>
                    </div>
                </div>
            );
          }

          // MAIN APP UI
          return (
            <div className="min-h-screen bg-slate-50 text-slate-900 font-sans pb-24">
              <header className="bg-white border-b border-slate-200 sticky top-0 z-50 px-6 py-4 shadow-sm">
                <div className="max-w-4xl mx-auto flex justify-between items-center">
                  <div>
                    <h1 className="text-xl font-black tracking-tight text-slate-800">Dignity <span className="text-indigo-600">Provision</span></h1>
                    <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest leading-none">Church Employment Initiative</p>
                  </div>
                  <div className="flex gap-2">
                    {isAdmin && (
                      <button onClick={() => setActiveTab('admin')} className={`p-2 rounded-full transition-colors ${activeTab === 'admin' ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-600'}`}>
                        <Icon name="Settings" size={18} />
                      </button>
                    )}
                    <div className="bg-indigo-50 p-2 rounded-full"><Icon name="Shield" size={18} className="text-indigo-600" /></div>
                  </div>
                </div>
              </header>

              <main className="max-w-4xl mx-auto p-4 sm:p-6">
                {activeTab === 'home' && <HomeView candidates={candidates} onNavigate={setActiveTab} />}
                {activeTab === 'candidate' && <CandidateView userId={user.uid} existingProfile={candidates.find(c => c.id === user.uid)} />}
                {activeTab === 'entrepreneur' && <EntrepreneurView candidates={candidates} isAdmin={isAdmin} />}
                {activeTab === 'intercessory' && <IntercessoryView candidates={candidates} />}
                {activeTab === 'admin' && isAdmin && <AdminView candidates={candidates} />}
              </main>

              <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 shadow-xl px-2 flex justify-around items-center z-50">
                <TabButton id="home" iconName="Home" label="Home" />
                <TabButton id="candidate" iconName="User" label="Profile" />
                <TabButton id="entrepreneur" iconName="Briefcase" label="Gaps" />
                <TabButton id="intercessory" iconName="Heart" label="Pray" />
              </nav>
            </div>
          );
        }

        // --- SUB-VIEWS ---
        function HomeView({ candidates, onNavigate }) {
          const testimonials = useMemo(() => {
            const thirtyDaysAgo = Date.now() - (30 * 24 * 60 * 60 * 1000);
            return candidates.filter(c => c.status === 'fulfilled' && c.testimonial && c.updatedAt > thirtyDaysAgo);
          }, [candidates]);

          return (
            <div className="space-y-8 animate-in fade-in">
              <div className="relative overflow-hidden bg-slate-900 rounded-[2.5rem] min-h-[350px] flex items-end p-8 text-white shadow-2xl">
                <img src="https://images.unsplash.com/photo-1516026672322-bc52d61a55d5?q=80&w=1200&auto=format&fit=crop" className="absolute inset-0 w-full h-full object-cover opacity-40" alt="SA" />
                <div className="relative z-10 w-full">
                  <h2 className="text-4xl font-black mb-4 leading-tight">Provision is <span className="text-indigo-400">Dignity</span>.</h2>
                  <p className="text-sm text-slate-300 max-w-sm mb-6 font-medium italic">"Whatever you do, work at it with all your heart, as working for the Lord..." — Col 3:23</p>
                  <button onClick={() => onNavigate('candidate')} className="bg-indigo-600 hover:bg-indigo-500 text-white px-8 py-4 rounded-2xl font-black text-sm shadow-xl transition-all active:scale-95">
                    Register for Provision
                  </button>
                </div>
              </div>

              {testimonials.length > 0 && (
                <div className="space-y-4">
                    <h3 className="font-black text-slate-800 flex items-center gap-2 px-2 text-lg uppercase tracking-tight">Praise Reports</h3>
                    <div className="flex gap-4 overflow-x-auto pb-4">
                        {testimonials.map(t => (
                            <div key={t.id} className="min-w-[280px] bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                                <p className="text-sm italic text-slate-600 mb-4 leading-relaxed font-medium">"{t.testimonial}"</p>
                                <div className="flex items-center gap-3">
                                    <div className="bg-indigo-50 text-indigo-600 p-2 rounded-xl"><Icon name="CheckCircle" size={14}/></div>
                                    <p className="text-xs font-black text-slate-800 uppercase">{t.name}</p>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
              )}
            </div>
          );
        }

        function CandidateView({ userId, existingProfile }) {
          const [submitting, setSubmitting] = useState(false);
          const [success, setSuccess] = useState(false);
          const [formData, setFormData] = useState({
            name: '', phone: '', skills: '', story: '', prayerRequest: '', 
            urgency: 'growth', workType: 'permanent', status: 'active', testimonial: '',
            pieceWorkSkills: ['', '', '']
          });

          useEffect(() => {
            if (existingProfile) setFormData(prev => ({ ...prev, ...existingProfile }));
          }, [existingProfile]);

          const save = async (updates = {}) => {
            setSubmitting(true);
            try {
              const profileDoc = doc(db, 'artifacts', appId, 'public', 'data', 'candidates', userId);
              await setDoc(profileDoc, { ...formData, ...updates, updatedAt: Date.now() });
              setSuccess(true);
              setTimeout(() => setSuccess(false), 3000);
            } catch (err) { console.error(err); } finally { setSubmitting(false); }
          };

          return (
            <div className="space-y-6">
              <div className="bg-indigo-600 p-8 rounded-[2.5rem] text-white shadow-xl">
                <h2 className="text-2xl font-black mb-1">Candidate Profile</h2>
                <p className="text-indigo-100 text-[10px] uppercase font-black tracking-widest">Bridging faith and opportunity</p>
              </div>

              <form onSubmit={(e) => { e.preventDefault(); save(); }} className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 space-y-6">
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  <div className="space-y-1">
                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Full Name</label>
                    <input required className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                  </div>
                  <div className="space-y-1">
                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">WhatsApp No.</label>
                    <input required className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none" value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} />
                  </div>
                </div>

                <div className="space-y-1">
                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Skills & Character</label>
                    <textarea required rows="3" className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none text-sm" value={formData.story} onChange={e => setFormData({...formData, story: e.target.value})} />
                </div>

                <button disabled={submitting} className={`w-full py-5 rounded-2xl font-black text-white shadow-xl transition-all uppercase text-xs tracking-widest ${success ? 'bg-emerald-500' : 'bg-indigo-600'}`}>
                  {submitting ? 'Connecting...' : success ? 'Saved! ✨' : 'Publish My Profile'}
                </button>
              </form>
            </div>
          );
        }

        function EntrepreneurView({ candidates }) {
          const active = candidates.filter(c => c.status === 'active');
          return (
            <div className="space-y-4">
              <h2 className="text-2xl font-black px-2">Active Talent</h2>
              {active.map(c => (
                <div key={c.id} className="bg-white rounded-[2rem] border border-slate-100 shadow-sm p-6">
                  <h4 className="font-black text-lg text-slate-800">{c.name}</h4>
                  <p className="text-indigo-600 font-black text-[10px] uppercase tracking-widest mb-4">{c.skills}</p>
                  <p className="text-sm italic text-slate-500 mb-6 pl-4 border-l-2 border-slate-100">"{c.story}"</p>
                  <button onClick={() => window.open(`https://wa.me/${c.phone?.replace(/\s/g, '')}`)} className="w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-2">
                    <Icon name="MessageSquare" size={14} /> Contact Bridge
                  </button>
                </div>
              ))}
            </div>
          );
        }

        function IntercessoryView({ candidates }) {
          const prayers = candidates.filter(c => c.status === 'active' && c.prayerRequest);
          return (
            <div className="space-y-6">
              <div className="bg-slate-900 rounded-[2.5rem] p-8 text-white min-h-[150px] flex items-center">
                <h2 className="text-3xl font-black tracking-tight">Prayer Wall</h2>
              </div>
              <div className="grid gap-4">
                {prayers.map(c => (
                  <div key={c.id} className="bg-white p-8 rounded-[2.5rem] border border-slate-50 shadow-sm">
                    <h4 className="text-indigo-600 font-black uppercase mb-2">{c.name}</h4>
                    <p className="text-slate-600 text-sm italic font-medium leading-relaxed mb-6">"{c.prayerRequest}"</p>
                    <button className="w-full py-4 bg-amber-400 text-white rounded-2xl font-black text-xs uppercase shadow-lg">Stand in Prayer</button>
                  </div>
                ))}
              </div>
            </div>
          );
        }

        function AdminView({ candidates }) {
          const del = async (id) => {
            if (!confirm("Delete?")) return;
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'candidates', id));
          };
          return (
            <div className="space-y-4">
              <h2 className="font-black text-2xl">Moderation</h2>
              {candidates.map(c => (
                <div key={c.id} className="bg-white p-5 rounded-2xl border flex justify-between items-center">
                  <p className="font-bold">{c.name}</p>
                  <button onClick={() => del(c.id)} className="p-2 bg-rose-50 text-rose-600 rounded-lg"><Icon name="Trash2" size={16}/></button>
                </div>
              ))}
            </div>
          );
        }

        function TabButton({ id, iconName, label, activeTab, setActiveTab }) {
          return (
            <button
              onClick={() => setActiveTab(id)}
              className={`flex flex-col items-center py-2 px-3 flex-1 transition-all ${
                activeTab === id ? 'text-indigo-600 border-t-2 border-indigo-600' : 'text-slate-400'
              }`}
            >
              <Icon name={iconName} size={18} className="mb-1" />
              <span className="text-[9px] font-bold uppercase tracking-wider">{label}</span>
            </button>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
